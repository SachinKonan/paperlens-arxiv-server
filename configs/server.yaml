# paperlens-arxiv-server runtime config.
#
# Defaults match the RANKER.md / litsearch reranking experiment:
#   - retriever: Qwen3-Embedding-0.6B FAISS over the per_venue 80K subset
#   - reranker:  PaperLens-V-3B (vision) at arxiv_21k_vision_3b/checkpoint-5236
#   - score:     softmax([logp_accept, logp_reject]) -> p_accept in [0,1]
#   - ranking:   0.3 * z(retriever_score) + 0.7 * p_accept  (per-query z-norm)
#   - retrieve:  fixed 200 candidates per query (k <= 200 trimmed at the end)
# See `external/arxiv_retriever/configs/retrieval/qwen3_06b_per_venue.yaml` for
# the upstream retriever's index/embedding pinning.

server:
  host: 0.0.0.0
  port: 8000

retriever:
  base_url: http://localhost:8001
  topk_retrieve: 200          # fixed pool size per RANKER.md §3.1
  timeout_seconds: 30.0

reranker:
  # PaperLens-V-3B on arxiv-21k (per_venue) -- the 'paperlens_v_3b' tag in RANKER.md §4.3.
  # Override with a local path or the HF repo 'skonan/paperlens-3b-vision-arxiv'.
  ckpt_path: /scratch/gpfs/ZHUANGL/sk7524/LLaMA-Factory-AutoReviewer/saves/final_sweep_v7_datasweepv3/final_data_sweep_v3/arxiv_train/small/arxiv_21k_vision_3b/checkpoint-5236
  modality: vision
  domain: arxiv               # PROMPT_ARXIV preamble
  template: qwen2_vl
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.7
  max_model_len: 24576

# Where the per-arxiv_id page PNGs live on disk. Two-fold fallback:
#   1. this explicit value (uncomment + set), OR
#   2. PAPERLENS_IMAGES_ROOT env var, OR
#   3. ${PAPERLENS_DATA_ROOT}/images_arxiv (env var fallback)
# images_root: /scratch/gpfs/ZHUANGL/sk7524/LLaMA-Factory-AutoReviewer/data/images_arxiv

cache:
  db_path: ./cache/p_accept.sqlite
  # Bootstrap source: run scripts/bootstrap_cache_from_litsearch.py once
  # against /scratch/gpfs/ZHUANGL/sk7524/litsearch_eval/passover/predictions_3b.parquet
  # to pre-load 28,664 papers (~36% of the 80K corpus) before first query.

search:
  default_blend: default              # 'default' = the documented blend; 'p_accept_only' = no z-norm
  blend_weight_retriever: 0.3
  blend_weight_p_accept: 0.7
