<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PaperLens arXiv Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root {
    --bg: #fafaf7; --fg: #232323; --muted: #767676; --accent: #1f6feb;
    --accept: #1a7f37; --reject: #cf222e; --card-bd: #d0d7de; --code-bg: #f4f4ee;
    --up: #1a7f37; --down: #cf222e;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--fg); margin: 0; }
  .wrap { max-width: 1200px; margin: 40px auto; padding: 0 24px; }
  h1 { font-size: 26px; margin: 0 0 4px 0; font-weight: 600; }
  p.sub { color: var(--muted); margin: 0 0 20px 0; font-size: 14px; }
  .search { display: flex; gap: 10px; margin-bottom: 8px; }
  .search input { flex: 1; padding: 11px 13px; border: 1px solid var(--card-bd);
                  border-radius: 8px; font-size: 15px; }
  button { background: var(--accent); color: #fff; border: none; border-radius: 8px;
           padding: 11px 20px; font-size: 15px; cursor: pointer; font-weight: 500; }
  button:disabled { opacity: 0.55; cursor: not-allowed; }
  .meta { color: var(--muted); font-size: 12px; margin-bottom: 18px; min-height: 16px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .col h2 { font-size: 14px; margin: 0 0 10px 0; text-transform: uppercase;
            letter-spacing: 0.5px; color: var(--muted); }
  .col.rerank h2 { color: var(--accent); }
  .card { background: #fff; border: 1px solid var(--card-bd); border-radius: 8px;
          padding: 10px 12px; margin-bottom: 8px; display: flex; gap: 10px; }
  .rank { font-weight: 700; color: var(--muted); min-width: 26px; font-variant-numeric: tabular-nums; }
  .body { flex: 1; min-width: 0; }
  .title { font-size: 14px; font-weight: 600; line-height: 1.3; margin: 0 0 3px 0; }
  .row2 { font-size: 12px; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .aid { font-family: ui-monospace, monospace; }
  .pa { font-weight: 600; color: var(--fg); }
  .pa.hi { color: var(--accept); }
  .pa.lo { color: var(--reject); }
  .move { font-weight: 600; }
  .move.up { color: var(--up); }
  .move.down { color: var(--down); }
  .move.flat { color: var(--muted); }
  .hit { font-size: 10px; padding: 1px 5px; border-radius: 4px; background: var(--code-bg); color: var(--muted); }
  .err { background: rgba(207,34,46,0.07); border: 1px solid var(--reject); padding: 12px;
         border-radius: 6px; color: var(--reject); white-space: pre-wrap; font-family: monospace; font-size: 13px; }
  .empty { color: var(--muted); font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>PaperLens arXiv Search</h1>
  <p class="sub">Retriever finds candidates; PaperLens reranks them by predicted acceptance. Left = retriever order, right = PaperLens-reranked.</p>
  <div class="search">
    <input id="q" type="text" placeholder="e.g. sparse attention for long-context transformers" />
    <button id="go">Search</button>
  </div>
  <div class="meta" id="meta"></div>
  <div id="out"></div>
</div>

<script>
const $ = (id) => document.getElementById(id);

function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

function paClass(p) { return p >= 0.5 ? "pa hi" : "pa lo"; }

// movement badge: where this paper sits in the OTHER ordering
function moveBadge(fromPos, toPos, label) {
  const d = fromPos - toPos;            // positive = moved up
  if (d > 0) return `<span class="move up">▲ ${label} ${d}</span>`;
  if (d < 0) return `<span class="move down">▼ ${label} ${-d}</span>`;
  return `<span class="move flat">— ${label} 0</span>`;
}

function card(p, side) {
  // base side: show where it moved TO in the rerank (rerank_position)
  // rerank side: show where it came FROM in the retriever (retriever_position)
  const rank = (side === "base" ? p.retriever_position : p.rerank_position) + 1;
  const move = side === "base"
    ? moveBadge(p.retriever_position, p.rerank_position, "rerank")
    : moveBadge(p.retriever_position, p.rerank_position, "from base #" + (p.retriever_position + 1) + ", ");
  const pa = (p.p_accept != null ? p.p_accept : 0).toFixed(3);
  const hit = p.cache_hit ? `<span class="hit">cached</span>` : "";
  return `<div class="card">
    <div class="rank">${rank}</div>
    <div class="body">
      <div class="title">${esc(p.title) || "(untitled)"}</div>
      <div class="row2">
        <span class="aid">${esc(p.paper_id)}</span>
        <span class="${paClass(p.p_accept)}">p_accept ${pa}</span>
        ${move} ${hit}
      </div>
    </div>
  </div>`;
}

function renderCol(title, items, side, cls) {
  const inner = items.length
    ? items.map((p) => card(p, side)).join("")
    : `<div class="empty">no results</div>`;
  return `<div class="col ${cls}"><h2>${title}</h2>${inner}</div>`;
}

async function run() {
  const q = $("q").value.trim();
  if (!q) { $("meta").textContent = "enter a query"; return; }
  $("go").disabled = true;
  $("meta").textContent = "retrieving + reranking … (first query for uncached papers can take a bit)";
  $("out").innerHTML = "";
  try {
    const r = await fetch("/search_compare", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q }),
    });
    if (!r.ok) { $("out").innerHTML = `<div class="err">${esc(await r.text())}</div>`; return; }
    const d = await r.json();
    $("meta").textContent = `pool ${d.pool} · ${d.n_cache_hits} cached, ${d.n_inferred} freshly scored`;
    $("out").innerHTML = `<div class="cols">`
      + renderCol("Base — retriever", d.base, "base", "base")
      + renderCol("Reranked — PaperLens", d.reranked, "rerank", "rerank")
      + `</div>`;
  } catch (e) {
    $("out").innerHTML = `<div class="err">${esc(String(e))}</div>`;
  } finally {
    $("go").disabled = false;
  }
}

$("go").addEventListener("click", run);
$("q").addEventListener("keydown", (e) => { if (e.key === "Enter") run(); });
</script>
</body>
</html>
